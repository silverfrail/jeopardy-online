<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Jeopardy — Overlay</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --green:  #5CFF5C;
            --blue:   #0000FF;
            --bg:     #0a0a12;
            --panel:  #121224;
            --yellow: #ffff5c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; }

        /* ── Canvas ── */
        #canvas { width: 1920px; height: 1080px; background: var(--bg); display: flex; flex-direction: column; position: relative; border: 2px solid rgba(0,0,255,0.15); }

        /* ── Game Area ── */
        .game-area { flex: 1; display: grid; grid-template-rows: auto 1fr; gap: 16px; position: relative; min-height: 0; }

        /* ── Category Row ── */
        .cat-row { display: grid; gap: 12px; height: 88px; }
        .cat-card { background: var(--panel); border: 2px solid var(--blue); color: #fff; display: flex; justify-content: center; align-items: center; text-align: center; font-weight: 800; font-size: 1.25rem; text-transform: uppercase; border-radius: 6px; padding: 6px; word-break: break-word; line-height: 1.3; }

        /* ── Clue Grid ── */
        .clue-grid { display: grid; gap: 12px; }
        .clue-card { background: var(--panel); border: 1px solid rgba(0,0,255,0.25); color: var(--green); font-size: 2.4rem; font-weight: 900; display: flex; justify-content: center; align-items: center; border-radius: 6px; }
        .clue-card.played { border-color: rgba(255,255,255,0.06); background: rgba(0,0,0,0.5); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 5px; gap: 3px; overflow: hidden; }
        .tile-answer { color: rgba(255,255,255,0.55); font-size: 1.15rem; font-weight: 700; text-align: center; line-height: 1.2; word-break: break-word; max-width: 100%; }
        .tile-scorer { font-size: 1rem; font-weight: 700; text-align: center; line-height: 1.3; }
        .tile-scorer.correct { color: var(--green); }
        .tile-scorer.wrong   { color: #ffaa44; }

        /* ── Clue Overlay ── */
        #clue-overlay { position: absolute; inset: 0; background: rgba(10,10,18,0.98); border: 4px solid var(--blue); border-radius: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 60px; text-align: center; opacity: 0; pointer-events: none; transition: opacity 0.25s ease; z-index: 10; }
        #clue-overlay.active { opacity: 1; }

        /* ── Daily Double Overlay ── */
        #dd-overlay { position: absolute; inset: 0; background: rgba(10,6,0,0.98); border: 4px solid var(--yellow); border-radius: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 60px; text-align: center; opacity: 0; pointer-events: none; transition: opacity 0.25s ease; z-index: 12; }
        #dd-overlay.active { opacity: 1; }
        .ov-dd-flash  { color: var(--yellow); font-size: 5rem; font-weight: 900; letter-spacing: 0.08em; line-height: 1.1; text-shadow: 0 0 40px rgba(255,255,90,0.5); }
        .ov-dd-cat    { color: rgba(255,255,255,0.6); font-size: 1.6rem; font-weight: 700; text-transform: uppercase; margin-top: 18px; }
        .ov-dd-player { color: #fff; font-size: 2.2rem; font-weight: 900; margin-top: 10px; }
        .ov-dd-prompt { color: var(--yellow); font-size: 1.4rem; font-weight: 600; margin-top: 20px; opacity: 0.8; }
        .ov-dd-timer  { margin-top: 28px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .ov-dd-timer-bar-wrap { width: 260px; height: 8px; background: rgba(255,255,255,0.15); border-radius: 4px; overflow: hidden; }
        .ov-dd-timer-bar { height: 100%; border-radius: 4px; background: var(--yellow); transition: width 0.9s linear, background 0.3s; }
        .ov-dd-timer-num { color: var(--yellow); font-size: 2rem; font-weight: 900; }
        .ov-dd-timer-num.warn   { color: #ffaa44; }
        .ov-dd-timer-num.urgent { color: #ff4444; }

        /* ── Answer Reveal Overlay ── */
        #answer-overlay { position: absolute; inset: 0; background: rgba(10,10,18,0.98); border: 4px solid var(--green); border-radius: 10px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 60px; text-align: center; opacity: 0; pointer-events: none; transition: opacity 0.25s ease; z-index: 11; }
        #answer-overlay.active { opacity: 1; }
        .ov-ar-label  { color: rgba(255,255,255,0.45); font-size: 1.6rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 24px; }
        .ov-ar-answer { color: var(--green); font-size: 4.5rem; font-weight: 900; line-height: 1.3; max-width: 88%; }
        .ov-cat { color: var(--blue); font-size: 1.6rem; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; }
        .ov-val { color: var(--green); font-size: 3rem; font-weight: 900; margin-bottom: 36px; }
        .ov-txt { color: var(--yellow); font-size: 3.4rem; font-weight: 700; line-height: 1.4; max-width: 88%; }

        /* ── Overlay Timer ── */
        #ov-timer { position: absolute; bottom: 36px; left: 80px; right: 80px; display: none; }
        .ov-timer-bar-wrap { height: 10px; background: rgba(255,255,255,0.12); border-radius: 5px; overflow: hidden; margin-bottom: 14px; }
        .ov-timer-bar { height: 100%; border-radius: 5px; background: var(--green); transition: width 0.9s linear, background 0.3s; }
        .ov-timer-num { text-align: center; font-size: 3rem; font-weight: 900; color: var(--green); line-height: 1; opacity: 0.88; }
        .ov-timer-num.warn   { color: var(--yellow); }
        .ov-timer-num.urgent { color: #ff4444; }

        /* ── Leaderboard ── */
        #leaderboard { display: grid; gap: 12px; height: 130px; padding: 0 10%; }
        .player-card { background: var(--panel); border: 2px solid var(--blue); border-radius: 8px; display: flex; align-items: center; padding: 0 36px; gap: 20px; }
        .p-rank  { color: rgba(255,255,255,0.3); font-size: 1.4rem; font-weight: 900; width: 30px; text-align: center; }
        .p-name  { color: #fff; font-size: 1.6rem; font-weight: 800; flex: 1; }
        .p-score { color: var(--green); font-size: 2.2rem; font-weight: 900; }

        /* ── Settings Gear ── */
        #gear { position: fixed; bottom: 18px; right: 18px; font-size: 22px; cursor: pointer; opacity: 0.35; transition: opacity 0.2s; color: #fff; z-index: 50; user-select: none; }
        #gear:hover { opacity: 1; }
        #settings { display: none; position: fixed; bottom: 55px; right: 18px; background: #16162a; border: 2px solid var(--blue); padding: 14px; border-radius: 8px; color: #fff; z-index: 50; width: 210px; font-size: 0.82rem; }
        #settings label { display: block; margin-bottom: 10px; }
        #settings input { width: 100%; margin-top: 4px; background: #000; border: 1px solid #333; color: #fff; padding: 5px 7px; border-radius: 3px; font-family: inherit; }
    </style>
</head>
<body>

<div id="gear" onclick="toggleSettings()">⚙️</div>
<div id="settings">
    <label>
        Border (%)
        <input type="text" id="border-in" oninput="setBorder(this.value)" placeholder="5%">
    </label>
    <label>
        Max players shown
        <input type="number" id="max-players" value="3" min="1" max="10" oninput="renderLeaderboard(lastScores)">
    </label>
</div>

<div id="canvas">
    <div class="game-area">
        <div class="cat-row"  id="cats"></div>
        <div class="clue-grid" id="grid"></div>
        <div id="dd-overlay">
            <div class="ov-dd-flash">⭐ DAILY DOUBLE ⭐</div>
            <div class="ov-dd-cat" id="ov-dd-cat"></div>
            <div class="ov-dd-player" id="ov-dd-player"></div>
            <div class="ov-dd-prompt">Waiting for wager...</div>
            <div class="ov-dd-timer" id="ov-dd-timer" style="display:none">
                <div class="ov-dd-timer-bar-wrap"><div class="ov-dd-timer-bar" id="ov-dd-timer-bar"></div></div>
                <div class="ov-dd-timer-num" id="ov-dd-timer-num">60</div>
            </div>
        </div>
        <div id="clue-overlay">
            <div class="ov-cat" id="ov-cat"></div>
            <div class="ov-val" id="ov-val"></div>
            <div class="ov-txt" id="ov-txt"></div>
            <div id="ov-timer">
                <div class="ov-timer-bar-wrap"><div class="ov-timer-bar" id="ov-timer-bar"></div></div>
                <div class="ov-timer-num" id="ov-timer-num">20</div>
            </div>
        </div>
        <div id="answer-overlay">
            <div class="ov-ar-label">The answer was</div>
            <div class="ov-ar-answer" id="ov-ar-answer"></div>
        </div>
    </div>
    <div id="leaderboard"></div>
</div>

<script>
// ── FIREBASE ──────────────────────────────────────────────────────────────────
const db = firebase.initializeApp({
    databaseURL: 'https://jeopardy-stream-default-rtdb.firebaseio.com'
}).database();

let lastScores       = {};
let initialRefresh   = true;

// ── TIMER STATE ────────────────────────────────────────────────────────────────
let pvTimerEnabled   = false;
let pvTimerSeconds   = 20;
let pvTimerHandle    = null;
let pvTimerRemaining = 0;
let pvActiveTileId   = null;

// ── DD WAGER TIMER STATE ──────────────────────────────────────────────────────
let pvDDWagerTimeout   = 60;  // synced from hostSettings
let pvDDWagerHandle    = null;
let pvDDWagerRemaining = 0;

// ── SETTINGS LISTENER (reads timer config pushed by host dashboard) ─────────
db.ref('settings').on('value', snap => {
    const s = snap.val();
    if (!s) return;
    pvTimerEnabled = !!s.timerEnabled;
    pvTimerSeconds = Math.min(30, Math.max(5, s.timerSeconds || 20));
});

// Sync DD wager timeout from hostSettings
db.ref('boardState/hostSettings/ddWagerTimeout').on('value', snap => {
    const v = snap.val();
    if (v != null) pvDDWagerTimeout = Math.max(5, parseInt(v, 10) || 60);
});

// ── SETTINGS ──────────────────────────────────────────────────────────────────
function toggleSettings() {
    const s = document.getElementById('settings');
    s.style.display = s.style.display === 'block' ? 'none' : 'block';
}

function setBorder(val) {
    const v = val.trim();
    const formatted = v.endsWith('%') ? v : (v ? v + '%' : '5%');
    document.getElementById('border-in').value = formatted;
    applyBorder(formatted);
    localStorage.setItem('streamBorder', formatted);
}

function applyBorder(val) {
    const canvas = document.getElementById('canvas');
    canvas.style.padding = val;
}

window.addEventListener('load', () => {
    const b = localStorage.getItem('streamBorder') || '5%';
    document.getElementById('border-in').value = b;
    applyBorder(b);
});

// ── BOARD LISTENER ────────────────────────────────────────────────────────────
db.ref('boardState').on('value', snap => {
    const data = snap.val();
    if (!data?.tiles) return;

    const numCats = data.categories.length;
    const numRows = data.tiles.length / numCats;

    // Set grid CSS variables
    document.getElementById('cats').style.gridTemplateColumns   = `repeat(${numCats}, 1fr)`;
    document.getElementById('grid').style.gridTemplateColumns   = `repeat(${numCats}, 1fr)`;
    document.getElementById('grid').style.gridTemplateRows      = `repeat(${numRows}, 1fr)`;

    // Categories
    const catEl   = document.getElementById('cats');
    catEl.innerHTML = '';
    data.categories.forEach(cat => {
        const d = document.createElement('div'); d.className = 'cat-card';
        d.innerText = cat;
        catEl.appendChild(d);
    });

    // Tiles — stored column-major → displayed row-major
    const tileResults = data.tileResults || {};
    const gridEl  = document.getElementById('grid');
    gridEl.innerHTML = '';
    for (let row = 0; row < numRows; row++) {
        for (let col = 0; col < numCats; col++) {
            const tile = data.tiles[col * numRows + row];
            const d    = document.createElement('div');
            d.className = 'clue-card' + (tile.played ? ' played' : '');
            if (tile.played) {
                const result  = tileResults[String(tile.id)] || {};
                const answer  = result.answer || '';
                const scorers = result.scorers || [];
                if (answer) {
                    const aEl = document.createElement('div');
                    aEl.className = 'tile-answer';
                    aEl.textContent = answer;
                    d.appendChild(aEl);
                }
                // Sort: correct (delta > 0) first, then wrong (delta <= 0)
                const sorted = [...scorers].sort((a, b) => b.delta - a.delta);
                sorted.forEach(s => {
                    const sEl = document.createElement('div');
                    if (s.delta === 0) {
                        sEl.className   = 'tile-scorer wrong';
                        sEl.textContent = `${s.username} ✗`;
                    } else {
                        const sign       = s.delta >= 0 ? '+' : '−';
                        const abs        = Math.abs(s.delta);
                        const wagerLabel = s.wager && s.delta < 0 ? ' wager' : (s.wager && s.delta > 0 ? ' wager' : '');
                        sEl.className   = 'tile-scorer ' + (s.delta >= 0 ? 'correct' : 'wrong');
                        sEl.textContent = `${s.username} ${sign}$${abs}${s.wager ? ' wager' : ''}`;
                    }
                    d.appendChild(sEl);
                });
            } else {
                d.innerText = `$${tile.value}`;
            }
            gridEl.appendChild(d);
        }
    }
});

// ── ACTIVE CLUE LISTENER ─────────────────────────────────────────────────────
db.ref('activeClue').on('value', snap => {
    const clue        = snap.val();
    const overlay     = document.getElementById('clue-overlay');
    const answerOverlay = document.getElementById('answer-overlay');
    const ddOverlay   = document.getElementById('dd-overlay');

    if (clue?.status === 'daily-double') {
        // Show DD splash, hide everything else
        ddOverlay.classList.add('active');
        overlay.classList.remove('active');
        answerOverlay.classList.remove('active');
        clearPreviewTimer();
        document.getElementById('ov-dd-cat').innerText    = clue.category || '';
        document.getElementById('ov-dd-player').innerText = clue.ddPlayer ? `@${clue.ddPlayer}` : '';
        pvActiveTileId = null;
        startDDWagerTimer();
    } else if (clue?.status === 'active' || clue?.status === 'daily-double-active') {
        clearDDWagerTimer();
        ddOverlay.classList.remove('active');
        answerOverlay.classList.remove('active');
        const valLabel = (clue.status === 'daily-double-active' && clue.ddWager)
            ? `$${clue.value} · Wager: $${clue.ddWager}`
            : `$${clue.value}`;
        document.getElementById('ov-cat').innerText = clue.category || '';
        document.getElementById('ov-val').innerText = valLabel;
        document.getElementById('ov-txt').innerText = clue.question || '';
        overlay.classList.add('active');
        if (clue.tileId !== pvActiveTileId) {
            pvActiveTileId = clue.tileId;
            pvTimerEnabled = !!clue.timerEnabled;
            pvTimerSeconds = Math.min(30, Math.max(5, clue.timerSeconds || 20));
            requestAnimationFrame(startPreviewTimer);
        }
    } else if (clue?.status === 'answer-reveal') {
        ddOverlay.classList.remove('active');
        overlay.classList.remove('active');
        clearPreviewTimer();
        pvActiveTileId = null;
        document.getElementById('ov-ar-answer').innerText = clue.answer || '';
        answerOverlay.classList.add('active');
    } else {
        clearDDWagerTimer();
        ddOverlay.classList.remove('active');
        overlay.classList.remove('active');
        answerOverlay.classList.remove('active');
        pvActiveTileId = null;
        clearPreviewTimer();
    }
});

// ── DD WAGER TIMER FUNCTIONS ─────────────────────────────────────────────────
function startDDWagerTimer() {
    clearDDWagerTimer();
    pvDDWagerRemaining = pvDDWagerTimeout;
    document.getElementById('ov-dd-timer').style.display = '';
    updateDDWagerTimerDisplay();
    pvDDWagerHandle = setInterval(() => {
        pvDDWagerRemaining--;
        updateDDWagerTimerDisplay();
        if (pvDDWagerRemaining <= 0) clearDDWagerTimer();
    }, 1000);
}

function clearDDWagerTimer() {
    if (pvDDWagerHandle) { clearInterval(pvDDWagerHandle); pvDDWagerHandle = null; }
    const el = document.getElementById('ov-dd-timer');
    if (el) el.style.display = 'none';
}

function updateDDWagerTimerDisplay() {
    const num = document.getElementById('ov-dd-timer-num');
    const bar = document.getElementById('ov-dd-timer-bar');
    const pct = pvDDWagerRemaining / pvDDWagerTimeout;
    if (num) {
        num.textContent = pvDDWagerRemaining;
        num.className = 'ov-dd-timer-num' + (pct <= 0.25 ? ' urgent' : pct <= 0.5 ? ' warn' : '');
    }
    if (bar) {
        bar.style.width      = (pct * 100) + '%';
        bar.style.background = pct > 0.5 ? 'var(--yellow)' : pct > 0.25 ? '#ffaa44' : '#ff4444';
    }
}

// ── PREVIEW TIMER FUNCTIONS ────────────────────────────────────────────────────────
function startPreviewTimer() {
    if (!pvTimerEnabled) return;
    clearPreviewTimer();
    pvTimerRemaining = pvTimerSeconds;
    document.getElementById('ov-timer').style.display = 'block';
    updatePreviewTimerDisplay();
    pvTimerHandle = setInterval(() => {
        pvTimerRemaining--;
        updatePreviewTimerDisplay();
        if (pvTimerRemaining <= 0) clearPreviewTimer();
    }, 1000);
}

function clearPreviewTimer() {
    if (pvTimerHandle) { clearInterval(pvTimerHandle); pvTimerHandle = null; }
    const el = document.getElementById('ov-timer');
    if (el) el.style.display = 'none';
}

function updatePreviewTimerDisplay() {
    const num = document.getElementById('ov-timer-num');
    const bar = document.getElementById('ov-timer-bar');
    const pct = pvTimerRemaining / pvTimerSeconds;
    if (num) {
        num.textContent = pvTimerRemaining;
        num.className = 'ov-timer-num' + (pct <= 0.25 ? ' urgent' : pct <= 0.5 ? ' warn' : '');
    }
    if (bar) {
        bar.style.width      = (pct * 100) + '%';
        bar.style.background = pct > 0.5 ? 'var(--green)' : pct > 0.25 ? 'var(--yellow)' : '#ff4444';
    }
}

// ── LEADERBOARD LISTENER ──────────────────────────────────────────────────────
db.ref('leaderboard').on('value', snap => {
    lastScores = snap.val() || {};
    renderLeaderboard(lastScores);
});

function renderLeaderboard(scores) {
    const max    = Math.max(1, parseInt(document.getElementById('max-players')?.value || 3));
    const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]).slice(0, max);
    const el     = document.getElementById('leaderboard');

    el.style.gridTemplateColumns = `repeat(${Math.min(sorted.length || 1, max)}, 1fr)`;
    el.innerHTML = '';

    sorted.forEach(([name, score], i) => {
        const d     = document.createElement('div'); d.className = 'player-card';
        const rank  = document.createElement('div'); rank.className  = 'p-rank';  rank.textContent  = `#${i + 1}`;
        const pname = document.createElement('div'); pname.className = 'p-name';  pname.textContent = name;
        const pscore= document.createElement('div'); pscore.className= 'p-score'; pscore.textContent= `$${Number(score).toLocaleString()}`;
        d.appendChild(rank); d.appendChild(pname); d.appendChild(pscore);
        el.appendChild(d);
    });
}

// ── OBS REFRESH LISTENER ──────────────────────────────────────────────────────
db.ref('refreshTrigger').on('value', snap => {
    // Skip the initial value on page load to avoid immediate reload loop
    if (initialRefresh) { initialRefresh = false; return; }
    if (snap.val()) location.reload();
});
</script>
</body>
</html>
